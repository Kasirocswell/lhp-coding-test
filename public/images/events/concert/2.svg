<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Concert event">
  <defs>
    <linearGradient id="bg-concert-2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#4c1d95"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="glow-concert-2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen-concert-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="soft-concert-2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="grain-concert-2">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
    </filter>
    <clipPath id="clip-concert-2"><rect width="800" height="600"/></clipPath>
  </defs>

  <g clip-path="url(#clip-concert-2)">
    <rect width="800" height="600" fill="url(#bg-concert-2)"/>
    <circle cx="160" cy="150" r="260" fill="url(#glow-concert-2)" filter="url(#soft-concert-2)"/>
    <circle cx="660" cy="470" r="220" fill="url(#glow-concert-2)" filter="url(#soft-concert-2)" opacity="0.7"/>
    <g opacity="0.9"><path d="M-20 156 Q 180 106 400 156 T 820 156" stroke="#ffffff" fill="none" stroke-width="2" opacity="0.10"/><path d="M-20 246 Q 180 196 400 246 T 820 246" stroke="#ffffff" fill="none" stroke-width="2" opacity="0.12"/><path d="M-20 336 Q 180 286 400 336 T 820 336" stroke="#ffffff" fill="none" stroke-width="2" opacity="0.14"/><path d="M-20 426 Q 180 376 400 426 T 820 426" stroke="#ffffff" fill="none" stroke-width="2" opacity="0.16"/><path d="M-20 516 Q 180 466 400 516 T 820 516" stroke="#ffffff" fill="none" stroke-width="2" opacity="0.18"/></g>
    <rect width="800" height="600" fill="url(#sheen-concert-2)"/>
    <rect width="800" height="600" filter="url(#grain-concert-2)" opacity="0.05"/>
    <g font-family="'Instrument Sans','Segoe UI',system-ui,sans-serif">
      <rect x="48" y="476" width="34" height="3" rx="1.5" fill="#ffffff" opacity="0.85"/>
      <text x="92" y="481" font-size="20" font-weight="600" fill="#ffffff" opacity="0.75" letter-spacing="5">EVENT</text>
      <text x="46" y="540" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Concert</text>
    </g>
  </g>
</svg>