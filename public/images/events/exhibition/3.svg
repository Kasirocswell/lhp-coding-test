<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Exhibition event">
  <defs>
    <linearGradient id="bg-exhibition-3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4c1d95"/>
      <stop offset="0.55" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#64748b"/>
    </linearGradient>
    <radialGradient id="glow-exhibition-3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen-exhibition-3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="soft-exhibition-3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="grain-exhibition-3">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
    </filter>
    <clipPath id="clip-exhibition-3"><rect width="800" height="600"/></clipPath>
  </defs>

  <g clip-path="url(#clip-exhibition-3)">
    <rect width="800" height="600" fill="url(#bg-exhibition-3)"/>
    <circle cx="400" cy="90" r="260" fill="url(#glow-exhibition-3)" filter="url(#soft-exhibition-3)"/>
    <circle cx="400" cy="560" r="220" fill="url(#glow-exhibition-3)" filter="url(#soft-exhibition-3)" opacity="0.7"/>
    <g opacity="0.9"><rect x="60" y="60" width="680" height="480" rx="10" stroke="#ffffff" fill="none" stroke-width="2" opacity="0.10"/><rect x="96" y="96" width="608" height="408" rx="10" stroke="#ffffff" fill="none" stroke-width="2" opacity="0.10"/><rect x="132" y="132" width="536" height="336" rx="10" stroke="#ffffff" fill="none" stroke-width="2" opacity="0.10"/><rect x="168" y="168" width="464" height="264" rx="10" stroke="#ffffff" fill="none" stroke-width="2" opacity="0.10"/><rect x="204" y="204" width="392" height="192" rx="10" stroke="#ffffff" fill="none" stroke-width="2" opacity="0.10"/></g>
    <rect width="800" height="600" fill="url(#sheen-exhibition-3)"/>
    <rect width="800" height="600" filter="url(#grain-exhibition-3)" opacity="0.05"/>
    <g font-family="'Instrument Sans','Segoe UI',system-ui,sans-serif">
      <rect x="48" y="476" width="34" height="3" rx="1.5" fill="#ffffff" opacity="0.85"/>
      <text x="92" y="481" font-size="20" font-weight="600" fill="#ffffff" opacity="0.75" letter-spacing="5">EVENT</text>
      <text x="46" y="540" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Exhibition</text>
    </g>
  </g>
</svg>