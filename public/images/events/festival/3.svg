<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Festival event">
  <defs>
    <linearGradient id="bg-festival-3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#701a75"/>
      <stop offset="0.55" stop-color="#c026d3"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <radialGradient id="glow-festival-3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
