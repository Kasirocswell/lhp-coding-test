<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Networking event">
  <defs>
    <linearGradient id="bg-networking-2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#164e63"/>
      <stop offset="0.55" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow-networking-2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen-networking-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="soft-networking-2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="grain-networking-2">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
    </filter>
    <clipPath id="clip-networking-2"><rect width="800" height="600"/></clipPath>
  </defs>

  <g clip-path="url(#clip-networking-2)">
    <rect width="800" height="600" fill="url(#bg-networking-2)"/>
    <circle cx="160" cy="150" r="260" fill="url(#glow-networking-2)" filter="url(#soft-networking-2)"/>
    <circle cx="660" cy="470" r="220" fill="url(#glow-networking-2)" filter="url(#soft-networking-2)" opacity="0.7"/>
    <g opacity="0.9"><line x1="176" y1="140" x2="356" y2="90" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="176" cy="140" r="6" fill="#ffffff" opacity="0.18"/><line x1="356" y1="90" x2="526" y2="200" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="356" cy="90" r="6" fill="#ffffff" opacity="0.18"/><line x1="526" y1="200" x2="706" y2="120" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="526" cy="200" r="6" fill="#ffffff" opacity="0.18"/><line x1="706" y1="120" x2="776" y2="320" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="706" cy="120" r="6" fill="#ffffff" opacity="0.18"/><line x1="776" y1="320" x2="616" y2="430" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="776" cy="320" r="6" fill="#ffffff" opacity="0.18"/><line x1="616" y1="430" x2="416" y2="360" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="616" cy="430" r="6" fill="#ffffff" opacity="0.18"/><line x1="416" y1="360" x2="236" y2="470" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="416" cy="360" r="6" fill="#ffffff" opacity="0.18"/><line x1="236" y1="470" x2="486" y2="540" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="236" cy="470" r="6" fill="#ffffff" opacity="0.18"/><line x1="486" y1="540" x2="176" y2="140" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="486" cy="540" r="6" fill="#ffffff" opacity="0.18"/></g>
    <rect width="800" height="600" fill="url(#sheen-networking-2)"/>
    <rect width="800" height="600" filter="url(#grain-networking-2)" opacity="0.05"/>
    <g font-family="'Instrument Sans','Segoe UI',system-ui,sans-serif">
      <rect x="48" y="476" width="34" height="3" rx="1.5" fill="#ffffff" opacity="0.85"/>
      <text x="92" y="481" font-size="20" font-weight="600" fill="#ffffff" opacity="0.75" letter-spacing="5">EVENT</text>
      <text x="46" y="540" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Networking</text>
    </g>
  </g>
</svg>