<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Networking event">
  <defs>
    <linearGradient id="bg-networking-3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#164e63"/>
      <stop offset="0.55" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow-networking-3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen-networking-3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="soft-networking-3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="grain-networking-3">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
    </filter>
    <clipPath id="clip-networking-3"><rect width="800" height="600"/></clipPath>
  </defs>

  <g clip-path="url(#clip-networking-3)">
    <rect width="800" height="600" fill="url(#bg-networking-3)"/>
    <circle cx="400" cy="90" r="260" fill="url(#glow-networking-3)" filter="url(#soft-networking-3)"/>
    <circle cx="400" cy="560" r="220" fill="url(#glow-networking-3)" filter="url(#soft-networking-3)" opacity="0.7"/>
    <g opacity="0.9"><line x1="212" y1="140" x2="392" y2="90" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="212" cy="140" r="6" fill="#ffffff" opacity="0.18"/><line x1="392" y1="90" x2="562" y2="200" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="392" cy="90" r="6" fill="#ffffff" opacity="0.18"/><line x1="562" y1="200" x2="742" y2="120" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="562" cy="200" r="6" fill="#ffffff" opacity="0.18"/><line x1="742" y1="120" x2="52" y2="320" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="742" cy="120" r="6" fill="#ffffff" opacity="0.18"/><line x1="52" y1="320" x2="652" y2="430" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="52" cy="320" r="6" fill="#ffffff" opacity="0.18"/><line x1="652" y1="430" x2="452" y2="360" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="652" cy="430" r="6" fill="#ffffff" opacity="0.18"/><line x1="452" y1="360" x2="272" y2="470" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="452" cy="360" r="6" fill="#ffffff" opacity="0.18"/><line x1="272" y1="470" x2="522" y2="540" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="272" cy="470" r="6" fill="#ffffff" opacity="0.18"/><line x1="522" y1="540" x2="212" y2="140" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/><circle cx="522" cy="540" r="6" fill="#ffffff" opacity="0.18"/></g>
    <rect width="800" height="600" fill="url(#sheen-networking-3)"/>
    <rect width="800" height="600" filter="url(#grain-networking-3)" opacity="0.05"/>
    <g font-family="'Instrument Sans','Segoe UI',system-ui,sans-serif">
      <rect x="48" y="476" width="34" height="3" rx="1.5" fill="#ffffff" opacity="0.85"/>
      <text x="92" y="481" font-size="20" font-weight="600" fill="#ffffff" opacity="0.75" letter-spacing="5">EVENT</text>
      <text x="46" y="540" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Networking</text>
    </g>
  </g>
</svg>