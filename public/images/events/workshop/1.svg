<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Workshop event">
  <defs>
    <linearGradient id="bg-workshop-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset="0.55" stop-color="#ea580c"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow-workshop-1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen-workshop-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="soft-workshop-1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="grain-workshop-1">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
    </filter>
    <clipPath id="clip-workshop-1"><rect width="800" height="600"/></clipPath>
  </defs>

  <g clip-path="url(#clip-workshop-1)">
    <rect width="800" height="600" fill="url(#bg-workshop-1)"/>
    <circle cx="640" cy="130" r="260" fill="url(#glow-workshop-1)" filter="url(#soft-workshop-1)"/>
    <circle cx="120" cy="520" r="220" fill="url(#glow-workshop-1)" filter="url(#soft-workshop-1)" opacity="0.7"/>
    <g opacity="0.9"><line x1="-200" y1="0" x2="100" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="-110" y1="0" x2="190" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="-20" y1="0" x2="280" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="70" y1="0" x2="370" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="160" y1="0" x2="460" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="250" y1="0" x2="550" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="340" y1="0" x2="640" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="430" y1="0" x2="730" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="520" y1="0" x2="820" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="610" y1="0" x2="910" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="700" y1="0" x2="1000" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="790" y1="0" x2="1090" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="880" y1="0" x2="1180" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="970" y1="0" x2="1270" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/></g>
    <rect width="800" height="600" fill="url(#sheen-workshop-1)"/>
    <rect width="800" height="600" filter="url(#grain-workshop-1)" opacity="0.05"/>
    <g font-family="'Instrument Sans','Segoe UI',system-ui,sans-serif">
      <rect x="48" y="476" width="34" height="3" rx="1.5" fill="#ffffff" opacity="0.85"/>
      <text x="92" y="481" font-size="20" font-weight="600" fill="#ffffff" opacity="0.75" letter-spacing="5">EVENT</text>
      <text x="46" y="540" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Workshop</text>
    </g>
  </g>
</svg>