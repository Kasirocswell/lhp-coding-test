<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Workshop event">
  <defs>
    <linearGradient id="bg-workshop-2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset="0.55" stop-color="#ea580c"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow-workshop-2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen-workshop-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="soft-workshop-2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="grain-workshop-2">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
    </filter>
    <clipPath id="clip-workshop-2"><rect width="800" height="600"/></clipPath>
  </defs>

  <g clip-path="url(#clip-workshop-2)">
    <rect width="800" height="600" fill="url(#bg-workshop-2)"/>
    <circle cx="160" cy="150" r="260" fill="url(#glow-workshop-2)" filter="url(#soft-workshop-2)"/>
    <circle cx="660" cy="470" r="220" fill="url(#glow-workshop-2)" filter="url(#soft-workshop-2)" opacity="0.7"/>
    <g opacity="0.9"><line x1="-164" y1="0" x2="136" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="-74" y1="0" x2="226" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="16" y1="0" x2="316" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="106" y1="0" x2="406" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="196" y1="0" x2="496" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="286" y1="0" x2="586" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="376" y1="0" x2="676" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="466" y1="0" x2="766" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="556" y1="0" x2="856" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="646" y1="0" x2="946" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="736" y1="0" x2="1036" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="826" y1="0" x2="1126" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="916" y1="0" x2="1216" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="1006" y1="0" x2="1306" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/></g>
    <rect width="800" height="600" fill="url(#sheen-workshop-2)"/>
    <rect width="800" height="600" filter="url(#grain-workshop-2)" opacity="0.05"/>
    <g font-family="'Instrument Sans','Segoe UI',system-ui,sans-serif">
      <rect x="48" y="476" width="34" height="3" rx="1.5" fill="#ffffff" opacity="0.85"/>
      <text x="92" y="481" font-size="20" font-weight="600" fill="#ffffff" opacity="0.75" letter-spacing="5">EVENT</text>
      <text x="46" y="540" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Workshop</text>
    </g>
  </g>
</svg>