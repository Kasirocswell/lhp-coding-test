<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Workshop event">
  <defs>
    <linearGradient id="bg-workshop-3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset="0.55" stop-color="#ea580c"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow-workshop-3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen-workshop-3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="soft-workshop-3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="grain-workshop-3">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
    </filter>
    <clipPath id="clip-workshop-3"><rect width="800" height="600"/></clipPath>
  </defs>

  <g clip-path="url(#clip-workshop-3)">
    <rect width="800" height="600" fill="url(#bg-workshop-3)"/>
    <circle cx="400" cy="90" r="260" fill="url(#glow-workshop-3)" filter="url(#soft-workshop-3)"/>
    <circle cx="400" cy="560" r="220" fill="url(#glow-workshop-3)" filter="url(#soft-workshop-3)" opacity="0.7"/>
    <g opacity="0.9"><line x1="-128" y1="0" x2="172" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="-38" y1="0" x2="262" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="52" y1="0" x2="352" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="142" y1="0" x2="442" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="232" y1="0" x2="532" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="322" y1="0" x2="622" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="412" y1="0" x2="712" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="502" y1="0" x2="802" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="592" y1="0" x2="892" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="682" y1="0" x2="982" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="772" y1="0" x2="1072" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="862" y1="0" x2="1162" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="952" y1="0" x2="1252" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/><line x1="1042" y1="0" x2="1342" y2="600" stroke="#ffffff" fill="none" stroke-width="1.5" opacity="0.10"/></g>
    <rect width="800" height="600" fill="url(#sheen-workshop-3)"/>
    <rect width="800" height="600" filter="url(#grain-workshop-3)" opacity="0.05"/>
    <g font-family="'Instrument Sans','Segoe UI',system-ui,sans-serif">
      <rect x="48" y="476" width="34" height="3" rx="1.5" fill="#ffffff" opacity="0.85"/>
      <text x="92" y="481" font-size="20" font-weight="600" fill="#ffffff" opacity="0.75" letter-spacing="5">EVENT</text>
      <text x="46" y="540" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Workshop</text>
    </g>
  </g>
</svg>